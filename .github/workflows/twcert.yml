name: TWCERT 情資分析
on:
  schedule:
    - cron: '0 1 * * *'  # 09:00 TW+8
  workflow_dispatch:
    inputs:
      since:
        description: 'Fetch start date (YYYY-MM-DD, TW+8). Defaults to today.'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8
      - run: uv sync
      - name: Run TWCERT fetcher
        env:
          TWCERT_ACCOUNT:        ${{ secrets.TWCERT_ACCOUNT }}
          TWCERT_PASSWORD:       ${{ secrets.TWCERT_PASSWORD }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:          ${{ secrets.GEMINI_MODEL || 'gemini-3.1-pro-preview' }}
          GOOGLE_SHEET_ID:       ${{ secrets.GOOGLE_SHEET_ID }}
          ASSETS_SHEET_ID:       ${{ secrets.ASSETS_SHEET_ID }}
          ASSETS_WORKSHEET:      ${{ secrets.ASSETS_WORKSHEET || '工作表1' }}
          GOOGLE_SA_JSON_B64:    ${{ secrets.GOOGLE_SA_JSON_B64 }}
          GIT_ARCHIVE_BRANCH:    ${{ secrets.GIT_ARCHIVE_BRANCH || 'data' }}
          GIT_ARCHIVE_AUTO_PUSH: 'true'
          USE_FIXTURE_DATA:      'false'
        run: |
          SINCE="${{ inputs.since || '' }}"
          [ -z "$SINCE" ] && SINCE=$(TZ=Asia/Taipei date +%Y-%m-%d)
          uv run python main.py --source twcert --since "$SINCE"
