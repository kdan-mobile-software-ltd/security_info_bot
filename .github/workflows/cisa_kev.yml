name: CISA KEV 情資分析
on:
  schedule:
    - cron: '0 1 * * *'  # 09:00 TW+8
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - name: Run CISA KEV fetcher
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:          ${{ secrets.GEMINI_MODEL || 'gemini-3.1-pro-preview' }}
          GOOGLE_SHEET_ID:       ${{ secrets.GOOGLE_SHEET_ID }}
          ASSETS_SHEET_ID:       ${{ secrets.ASSETS_SHEET_ID }}
          ASSETS_WORKSHEET:      ${{ secrets.ASSETS_WORKSHEET || '工作表1' }}
          GOOGLE_SA_JSON_B64:    ${{ secrets.GOOGLE_SA_JSON_B64 }}
          GIT_ARCHIVE_BRANCH:    ${{ secrets.GIT_ARCHIVE_BRANCH || 'data' }}
          GIT_ARCHIVE_AUTO_PUSH: 'true'
          USE_FIXTURE_DATA:      'false'
        run: uv run python main.py --source cisa_kev --since $(date -u +%Y-%m-%d)
